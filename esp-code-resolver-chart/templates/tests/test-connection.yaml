---
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "esp-code-resolver.fullname" . }}-test-connection"
  labels:
    {{- include "esp-code-resolver.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ["wget"]
      args:
        - "--spider"
        - "http://{{ include "esp-code-resolver.serviceName" . }}:{{ .Values.service.port }}/healthz"
  restartPolicy: Never
